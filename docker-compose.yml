services:
  dev-box:
    image: ubuntu:22.04
    container_name: dev-box
    network_mode: host
    privileged: true
    labels:
      - com.centurylinklabs.watchtower.enable=false
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${PROJECTS_DIR:-/home/docker/projects}:/workspace
      - /:/host_root
      - vscode-cli:/root/.vscode-cli
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    command: ["/bin/bash", "/workspace/.dev-infra/init_devbox.sh"]

  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASH_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 128m

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-devuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=${DB_NAME:-devdb}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    labels:
      - traefik.enable=false
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    labels:
      - traefik.enable=false
    mem_limit: 192m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio-console.rule=Host(`minio.localhost`)
      - traefik.http.routers.minio-console.entrypoints=web
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    volumes:
      - mailpit-data:/data
    environment:
      - MP_DATABASE=/data/mailpit.db
    labels:
      - traefik.enable=true
      - traefik.http.routers.mailpit.rule=Host(`mail.localhost`)
      - traefik.http.routers.mailpit.entrypoints=web
      - traefik.http.services.mailpit.loadbalancer.server.port=8025
    mem_limit: 64m

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=timescaledb
      - ADMINER_DESIGN=dracula
    labels:
      - traefik.enable=true
      - traefik.http.routers.adminer.rule=Host(`db.localhost`)
      - traefik.http.routers.adminer.entrypoints=web
      - traefik.http.services.adminer.loadbalancer.server.port=8080
    mem_limit: 64m
    depends_on:
      - timescaledb

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - ${HOMEPAGE_PORT:-3000}:3000
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS:-*}
    volumes:
      - homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage.rule=Host(`home.localhost`)
      - traefik.http.routers.homepage.entrypoints=web
      - traefik.http.services.homepage.loadbalancer.server.port=3000
    mem_limit: 128m

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_MONITOR_ONLY=false
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - com.centurylinklabs.watchtower.enable=false
    mem_limit: 64m

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - ${DOZZLE_PORT:-9999}:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.dozzle.rule=Host(`logs.localhost`)
      - traefik.http.routers.dozzle.entrypoints=web
      - traefik.http.services.dozzle.loadbalancer.server.port=8080
    mem_limit: 64m

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - ${KUMA_PORT:-3001}:3001
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.kuma.rule=Host(`status.localhost`)
      - traefik.http.routers.kuma.entrypoints=web
      - traefik.http.services.kuma.loadbalancer.server.port=3001
    mem_limit: 128m

volumes:
  vscode-cli:
  timescaledb-data:
  redis-data:
  minio-data:
  mailpit-data:
  homepage-config:
  uptime-kuma-data:
